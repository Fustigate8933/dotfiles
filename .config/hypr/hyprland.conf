 # __     __         _       _     _
 # \ \   / /_ _ _ __(_) __ _| |__ | | ___  ___
 #  \ \ / / _` | '__| |/ _` | '_ \| |/ _ \/ __|
 #   \ V / (_| | |  | | (_| | |_) | |  __/\__ \
 #    \_/ \__,_|_|  |_|\__,_|_.__/|_|\___||___/
debug {
    disable_logs = false
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = true
		disable_while_typing = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 4
    gaps_out = 0, 7, 7, 7
    border_size = 3
    # col.active_border = rgba(82A0D8dd) rgba(FFF5FDdd) rgba(F5C0C0dd) rgba(FFF5FDdd) 45deg
    # col.active_border = rgba(dadae8ee) 45deg
    # col.inactive_border = rgba(595959ff)

    layout = dwindle
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 7

    blur {
        enabled = true
        ignore_opacity = true
        size = 10  # 3
        passes = 1
    }

    # active_opacity = 0.8
    # inactive_opacity = 0.8
    #
    # blur {
    #     enabled = true
    #     size = 10
    #     new_optimizations = true
    #     ignore_opacity = true
    #     noise = 0
    #     brightness = 0.60
    #     passes = 1
    # }

	# shadow {
	# 	enabled = false
	# 	range = 4
	# 	render_power = 3
	# 	color = rgba(1a1a1aee)
	# }
}

opengl {
    nvidia_anti_flicker = false
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
    animation = specialWorkspace, 1, 5.5, myBezier, slidevert
    animation = borderangle, 1, 100, linear, loop
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
}

gestures {
    workspace_swipe_forever = true
    workspace_swipe_direction_lock = false
}
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
# device:epic-mouse-v1 {
#     sensitivity = -0.5
# }
device {
	name = logitech-usb-receiver-mouse
	sensitivity = -0.75 # 0.68
}

device {
	name = asuf1416:00-2808:0108-touchpad
	enabled = true
}

device {
	name = logitech-usb-receiver-mouse
	enabled = true
}

xwayland {
  force_zero_scaling = true
}

input {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    follow_mouse = 2
	force_no_accel = 0
}

binds {
	# workspace_back_and_forth = true
}

misc {
	allow_session_lock_restore = true
}

