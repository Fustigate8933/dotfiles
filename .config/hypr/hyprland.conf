#
# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrule {
  name = windowrule-1
  stay_focused = on
  match:initial_title = ^(EmotionView)$
}

windowrule {
  name = windowrule-2
  float = on
  match:class = ^(pavucontrol)$
}

windowrule {
  name = windowrule-3
  tile = on
  match:class = ^(acrord32.exe)$
}

windowrule {
  name = windowrule-4
  float = on
  match:class = ^(wechat.exe)$
}

windowrule {
  name = windowrule-5
  tile = on
  match:title = ^WPS Writer
}

windowrule {
  name = windowrule-6
  no_focus = on
  match:class = ^jetbrains-(?!toolbox)
  match:float = 1
  match:title = ^win\d+$ # Prevents jetbrains menu to disrupt window focus
}

# windowrulev2 = nofocus,class:^Foxit Reader,floating:1,title:^win\d+$ # Prevents jetbrains menu to disrupt window focus
windowrule {
  name = windowrule-7
  tile = on
  match:class = ^(ONLYOFFICE Desktop Editors)$
}

windowrule {
  name = windowrule-8
  tile = on
  match:title = ^LINE$
}

windowrule {
  name = windowrule-9
  float = on
  match:title = ^Floorp — Sharing Indicator$
}

windowrule {
  name = windowrule-10
  float = on
  match:title = ^Sony Headphones App v1.3.1$
}

windowrule {
  name = windowrule-11
  float = on
  match:title = ^Kalk — Calculator$
}

# windowrulev2 = opacity 1.0 override 1.0 override, class:^(VirtualBox Machine)$
# windowrulev2 = opacity 1.0 override 1.0 override, title:^LINE$
windowrule {
  name = windowrule-12
  opacity = 0.9 override 0.9 override
  match:class = ^kitty$
}

windowrule {
  name = windowrule-13
  opacity = 0.95 override 0.95 override
  match:class = ^kitty$
  match:title = .*nvim.*
}

windowrule {
  name = windowrule-14
  opacity = 0.88 override 0.8 override
  xray = 1
  match:class = ^(discord)$
}

windowrule {
  name = windowrule-15
  opacity = 0.8 override 0.8 override
  match:class = ^(org.kde.dolphin)$
}

windowrule {
  name = windowrule-16
  opacity = 0.85 override 0.85 override
  match:class = ^(jetbrains-pycharm)$
}

windowrule {
  name = windowrule-17
  opacity = 0.85 override 0.9 override
  match:class = ^(DesktopEditors)$
}

windowrule {
  name = windowrule-18
  opacity = 0.83 override 0.83 override
  match:class = ^(org.kde.kate)$
}

windowrule {
  name = windowrule-19
  opacity = 0.92 override 0.92 override
  match:class = ^(notion-app-enhanced)$
}

windowrule {
  name = windowrule-20
  opacity = 0.96 override 0.96 override
  match:class = ^(firefox)$
}

windowrule {
  name = windowrule-21
  opacity = 0.85 override 0.9 override
  match:class = ^(anki)$
}

windowrule {
  name = windowrule-22
  opacity = 0.75 override 0.75 override
  workspace = special:sw1
  xray = 1
  match:class = ^(YouTube Music)$
}

# windowrulev2 = workspace special:sw2, class:^(VirtualBox Machine)$
windowrule {
  name = windowrule-23
  animation = popin
  match:title = ^eww-calendar$
}

# windowrulev2 = workspace name:wechat, class:^(wechat.exe)$
windowrule {
  name = windowrule-24
  workspace = special:sw7
  match:class = ^(explorer.exe)$
}

windowrule {
  name = windowrule-25
  workspace = special:sw7
  match:class = ^(whale.exe)$
}


