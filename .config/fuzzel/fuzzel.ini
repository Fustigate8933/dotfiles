[main]
dpi-aware=no
font=monospace:size=22
icons-enabled=yes
terminal=kitty
prompt="Search... "
lines=7
width=50
horizontal-pad=15
vertical-pad=15
inner-pad=8
line-height=32
layer=overlay
fields=name,generic
tabs=8

[border]
width=2
radius=5

[colors]
background=141414cc
text=e1e1e1ff
prompt=e1e1e1ff
input=e1e1e1ff
match=e1e1e1ff
selection=356a9999
selection-text=e1e1e1ff
selection-match=e1e1e1ff
border=356a9999

[key-bindings]
prev=Control+p
prev-with-wrap=Up ISO_Left_Tab
next=Control+n
next-with-wrap=Down
